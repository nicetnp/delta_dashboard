<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title id="pageTitle">Failures Dashboard by Tester</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* … (คง style เดิมไว้ทั้งหมด) … */
</style>
</head>
<body>

<div class="container">
    <h2 id="pageTitleHeader">Failure Count by Tester (Today)</h2>
    <div class="line-info">
        Line ID: <span id="displayLineId"></span> | Station: <span id="displayStation"></span>
    </div>

    <div id="chartContainer">
        <canvas id="failuresChart"></canvas>
    </div>

    <h3>Detailed Failure Records</h3>
    <table>
        <thead>
            <tr>
                <th>Tester</th>
                <th>Fixture</th>
                <th>Fail Item</th>
                <th>Date/Time</th>
            </tr>
        </thead>
        <tbody id="resultTableBody">
            <tr><td colspan="4">Loading data...</td></tr>
        </tbody>
    </table>
    <button class="back-button" onclick="goBackToSummary()">Back to Summary</button>
</div>

<script>
const ctx = document.getElementById('failuresChart').getContext('2d');
const tbody = document.getElementById('resultTableBody');
const displayLineIdSpan = document.getElementById('displayLineId');
const displayStationSpan = document.getElementById('displayStation');
const pageTitleHeader = document.getElementById('pageTitleHeader');

let ws = null;
let chart = null;
let currentLineId = '';
let currentStation = '';

function getQueryParams() {
    const params = {};
    window.location.search.substring(1).split('&').forEach(param => {
        const parts = param.split('=');
        if (parts.length === 2) {
            params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1].replace(/\+/g, ' '));
        }
    });
    return params;
}

function startWebSocket(lineId, station) {
    if (ws) ws.close();

    ws = new WebSocket(`ws://localhost:8000/failures/ws/station?lineId=${lineId}&station=${station}`);

    ws.onopen = () => {
        tbody.innerHTML = '<tr><td colspan="4">Waiting for data...</td></tr>';
    };

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (!data || data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4">No failure data for ${station} today.</td></tr>`;
            if (chart) chart.destroy();
            chart = null;
            return;
        }

        updateChart(data, station);
        updateTable(data);
    };

    ws.onclose = () => console.log("WebSocket closed");
    ws.onerror = err => console.error("WebSocket error:", err);
}

function updateChart(data, station) {
    const testerIdCounts = {};
    data.forEach(item => {
        testerIdCounts[item.testerId] = (testerIdCounts[item.testerId] || 0) + 1;
    });

    const sortedTesterIds = Object.entries(testerIdCounts).sort((a, b) => {
        const numA = parseInt(a[0].match(/\d+/)?.[0] || '0', 10);
        const numB = parseInt(b[0].match(/\d+/)?.[0] || '0', 10);
        return numA - numB;
    });

    const labels = sortedTesterIds.map(([testerId]) => testerId);
    const values = sortedTesterIds.map(([, count]) => count);

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels,
            datasets: [{
                label: `Total Failures (${station}) by Tester`,
                data: values,
                backgroundColor: 'rgba(0,0,0,0.6)',
                borderColor: 'rgb(0,0,0)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    title: { display: true, text: 'Number of Failures' },
                    ticks: { stepSize: 1 }
                },
                x: {
                    title: { display: true, text: 'Tester ID' }
                }
            }
        }
    });
}

function updateTable(data) {
    tbody.innerHTML = '';
    data.sort((a, b) => new Date(b.workDate) - new Date(a.workDate));
    data.forEach(row => {
        const formattedDate = row.workDate.replace('T', ' ');
        tbody.innerHTML += `
        <tr>
            <td>${row.testerId}</td>
            <td>${row.fixtureId}</td>
            <td>${row.failItem}</td>
            <td>${formattedDate}</td>
        </tr>`;
    });
}

function goBackToSummary() {
    window.location.href = `index.html?lineId=${currentLineId}`;
}

document.addEventListener('DOMContentLoaded', () => {
    const params = getQueryParams();
    const lineIdFromUrl = params.lineId;
    const stationFromUrl = params.station;

    if (lineIdFromUrl && stationFromUrl) {
        currentLineId = lineIdFromUrl;
        currentStation = stationFromUrl;

        displayLineIdSpan.textContent = currentLineId;
        displayStationSpan.textContent = currentStation;
        pageTitleHeader.textContent = `${currentStation} Failure Count by Tester (Today)`;
        document.title = `${currentStation} Failures Dashboard`;

        startWebSocket(currentLineId, currentStation);
    } else {
        pageTitleHeader.textContent = "Error: Missing Line ID or Station";
        tbody.innerHTML = '<tr><td colspan="4">Error: Missing parameters. Please go back to the summary page.</td></tr>';
    }
});
</script>

</body>
</html>
